
services:
  db:
    image: postgres:13
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: campfiremc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/init.sql:/docker-entrypoint-initdb.d/init.sql

  server:
    build: ./server
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - db
    volumes:
      - ./server/public/uploads:/app/public/uploads
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/campfiremc
      PORT: 5000
      JWT_SECRET: your-super-secret-key-that-is-long-and-secure

  client:
    build: ./client
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - server
    environment:
      REACT_APP_API_URL: http://localhost:5000

volumes:
  postgres_data:
